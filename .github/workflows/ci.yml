name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build (macOS ${{ matrix.os }}, Xcode ${{ matrix.xcode }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-26]
        xcode: ['26']

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Show environment
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -scheme WhiskrKit \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: Test (macOS ${{ matrix.os }}, Xcode ${{ matrix.xcode }})
    runs-on: ${{ matrix.os }}
    needs: [build]
    strategy:
      matrix:
        os: [macos-26]
        xcode: ['26']

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Test
        run: |
          xcodebuild test \
            -scheme WhiskrKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
